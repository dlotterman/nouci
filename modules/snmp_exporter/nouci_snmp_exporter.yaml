packages:
    - snmpd
    - snmp
    - snmp-mibs-downloader
    - libsnmp-dev
    - libsnmp-base

runcmd:
    - [systemctl, daemon-reload]
    - [systemctl, disable, --now, snmpd.service]
    - [
          net-snmp-create-v3-user,
          -ro,
          -A,
          Megaport06,
          -a,
          SHA,
          -X,
          EncryptPass,
          -x,
          AES,
          nouci-snmp-user,
      ]
    - [systemctl, enable, --now, snmpd.service]
    - [systemctl, enable, --now, nouci_snmp_exporter.service]

    #- [systemctl, enable, --now, nouci_snmp_exporter.service]
    - [ufw, allow, from, 172.17.0.1/16, to, any, port, 9116]
    - [ufw, allow, from, 172.17.0.1/16, proto, udp, to, any, port, 161]

write_files:
    - path: /etc/systemd/system/nouci_snmp_exporter.service
      owner: root:root
      append: false
      content: |
          [Unit]
          Description=nouci_snmp_exporter
          After=nouci_disk_enc_first_boot.service docker.service network-online.target
          ConditionPathIsEncrypted=/mnt/opt/nouci_data/ready
          [Service]
          Type=simple
          Restart=no
          ExecStartPre=-/usr/bin/docker stop nouci_snmp_exporter
          ExecStartPre=-/usr/bin/docker rm nouci_snmp_exporter
          ExecStartPre=docker image pull docker.io/prom/snmp-exporter:main-distroless
          ExecStartPre=mkdir -p /mnt/opt/nouci_data/snmp_exporter/data /mnt/opt/nouci_data/snmp_exporter/config
          ExecStart=docker run --name nouci_snmp_exporter \
          -p 9116:9116 \
          -v /etc/timezone:/etc/timezone:ro \
          -v /etc/localtime:/etc/localtime:ro \
          -v /opt/nouci/nouci/modules/snmp_exporter/assets/snmp.yml:/etc/snmp_exporter/snmp.yml:ro \
          -v /opt/nouci/nouci/modules/snmp_exporter/assets/auth.yaml:/etc/snmp_exporter/auth.yml:ro \
          docker.io/prom/snmp-exporter:main-distroless --config.file /etc/snmp_exporter/snmp.yml --config.file /etc/snmp_exporter/auth.yml
          ExecStop=/usr/bin/docker stop -t 30 nouci_snmp_exporter
          TimeoutStartSec=120
          TimeoutStopSec=45
          [Install]
          WantedBy=multi-user.target

    - path: /etc/snmp/snmpd.conf
      owner: root:root
      append: false
      content: |
          sysLocation    nouci_hosted
          sysContact     root@localhost
          sysServices    72
          master  agentx
          agentaddress  172.16.16.249
          view   systemonly  included   .1.3.6.1.2.1.1
          view   systemonly  included   .1.3.6.1.2.1.25.1
          rocommunity  public
          rouser authPrivUser authpriv

    - path: /opt/nouci/prometheus/config/scrape_d/snmp_exporter_base.yaml
      owner: root:root
      append: false
      content: |
          scrape_configs:
            - job_name: 'snmp'
              static_configs:
                - targets:
                  - 172.16.16.249  # SNMP device.
              metrics_path: /snmp
              params:
                auth: [nouci]
                module: [if_mib]
              relabel_configs:
                - source_labels: [__address__]
                  target_label: __param_target
                - source_labels: [__param_target]
                  target_label: instance
                - target_label: __address__
                  replacement: 172.16.16.249:9116  # The SNMP exporter's real hostname:port.
            # Global exporter-level metrics
            - job_name: 'snmp_exporter'
              static_configs:
                - targets: ['172.16.16.249:9116']
