    - path: /opt/nouci/blackbox_exporter/nouci_blackbox_config.yaml
      owner: root:root
      append: false
      content: |
          modules:
            http_2xx:
              prober: http
              http:
                preferred_ip_protocol: "ip4"
            http_4xx:
              prober: http
              http:
                preferred_ip_protocol: "ip4"
                  #valid_status_codes: 400,401,402,403,404,405,406,407,408,409,410,411,412,413,414,415,415,416,417,418,421,422,423,424,425,426,428,429,431,451
                valid_status_codes: 
                  - 400
                  - 401
                  - 402
                  - 403
                  - 404
                  - 405
                  - 406
                  - 407
                  - 408
            http_post_2xx:
              prober: http
              http:
                method: POST
            tcp_connect:
              prober: tcp
            pop3s_banner:
              prober: tcp
              tcp:
                query_response:
                - expect: "^+OK"
                tls: true
                tls_config:
                  insecure_skip_verify: false       
            icmp:
              prober: icmp
            dns_udp_example:
              prober: dns
              timeout: 5s
              dns:
                query_name: "www.prometheus.io"
                query_type: "A"
                valid_rcodes:
                  - NOERROR
                validate_answer_rrs:
                  fail_if_matches_regexp:
                    - ".*127.0.0.1"
                  fail_if_all_match_regexp:
                    - ".*127.0.0.1"
                  fail_if_not_matches_regexp:
                    - "www.prometheus.io.\t300\tIN\tA\t127.0.0.1"
                  fail_if_none_matches_regexp:
                    - "127.0.0.1"
                validate_authority_rrs:
                  fail_if_matches_regexp:
                    - ".*127.0.0.1"
                validate_additional_rrs:
                  fail_if_matches_regexp:
                    - ".*127.0.0.1"

    - path: /opt/nouci/blackbox_exporter/bin/nouci_bbe_gen.sh
      owner: root:root
      append: false
      content: |
          #!/bin/bash
          DR=$(ip route get 1.1.1.1 | grep src | awk '{print$3}')
          DNS=$(resolvectl dns | awk '{print$4}' | grep -v -e '^$' | sort | uniq)
          mkdir -p /opt/nouci/prometheus/config/scrape_d
          cat > /opt/nouci/prometheus/config/scrape_d/default_route_backbox.yaml << EOL
          scrape_configs:
            - job_name: 'blackbox_default_route'
              scrape_interval: 5s
              metrics_path: /probe
              params:
                module: [icmp]
              static_configs:
                - targets:
                  - $DR
                  labels:
                    app: "blackbox_exporter"
              relabel_configs:
                - source_labels: [__address__]
                  target_label: __param_target
                - source_labels: [__param_target]
                  target_label: instance
                - target_label: __address__
                  replacement: 172.16.16.249:9115
          EOL
