                - targets:
                  - https://prometheus.io   # Cloudflare CDN
                  - https://techdocs.akamai.com/home # Akamai CDN
                  - https://www.fastly.com # Fastly
                  - http://b-cdn.net
                  - http://google.com
                  - https://amazon.com
                  - http://fbcdn.net
                  - https://cdn.js7k.com #yahoo
