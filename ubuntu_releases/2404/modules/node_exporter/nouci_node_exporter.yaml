runcmd:
    - [systemctl, daemon-reload]
    - [systemctl, enable, --now, nouci_node_exporter.service]
    - [ufw, allow, from, 172.17.0.1/16, to, any, port, "9100"]

write_files:
    - path: /etc/systemd/system/nouci_node_exporter.service
      owner: root:root
      append: false
      content: |
          [Unit]
          Description=nouci_node_exporter
          After=nouci_disk_enc_first_boot.service docker.service network-online.target
          ConditionPathIsEncrypted=/mnt/opt/nouci_data/ready
          [Service]
          Type=simple
          Restart=no
          ExecStartPre=-/usr/bin/docker stop nouci_node_exporter
          ExecStartPre=-/usr/bin/docker rm nouci_node_exporter
          ExecStartPre=docker image pull quay.io/prometheus/node-exporter:latest
          ExecStart=docker run --name nouci_node_exporter \
          -p 9100:9100 \
          -v /etc/timezone:/etc/timezone:ro \
          -v /etc/localtime:/etc/localtime:ro \
          --net="host" \
          --pid="host" \
          -v "/:/host:ro,rslave" \
          quay.io/prometheus/node-exporter:latest \
          --path.rootfs=/host
          ExecStop=/usr/bin/docker stop -t 30 nouci_node_exporter
          TimeoutStartSec=120
          TimeoutStopSec=45
          [Install]
          WantedBy=multi-user.target
