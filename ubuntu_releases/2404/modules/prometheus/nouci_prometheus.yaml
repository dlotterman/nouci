runcmd:
    - [systemctl, daemon-reload]
    - [systemctl, enable, --now, nouci_prometheus.service]
    - [ufw, allow, from, 172.17.0.1/16, to, any, port, "9090"]

write_files:
    - path: /etc/systemd/system/nouci_prometheus.service
      owner: root:root
      append: false
      content: |
          [Unit]
          Description=nouci_prometheus
          After=nouci_node_exporter.service nouci_blackbox_exporter.service nouci_snmp_exporter.service docker.service
          ConditionPathIsEncrypted=/mnt/nouci/.ready
          [Service]
          Type=simple
          Restart=no
          ExecStartPre=-/usr/bin/docker stop nouci_prometheus
          ExecStartPre=-/usr/bin/docker rm nouci_prometheus
          ExecStartPre=-mkdir -p /mnt/nouci/prometheus/data
          ExecStartPre=docker image pull prom/prometheus
          ExecStart=docker run --name nouci_prometheus \
          -p 172.16.16.249:9090:9090  \
          --user %u \
          -v /etc/timezone:/etc/timezone:ro \
          -v /etc/localtime:/etc/localtime:ro \
          -v /mnt/nouci/prometheus/data:/prometheus \
          -v /opt/nouci/prometheus/config/nouci_prometheus.yaml:/etc/prometheus/prometheus.yml \
          -v /opt/nouci/prometheus/config/scrape_d:/etc/prometheus/scrape_d \
          prom/prometheus
          ExecStop=/usr/bin/docker stop -t 30 nouci_prometheus
          TimeoutStartSec=120
          TimeoutStopSec=45
          [Install]
          WantedBy=multi-user.target

    - path: /opt/nouci/prometheus/config/nouci_prometheus.yaml
      owner: root:root
      append: false
      content: |
          global:
            scrape_interval: 60s
            evaluation_interval: 60s
          alerting:
            alertmanagers:
              - static_configs:
                  - targets:
          rule_files:
          scrape_config_files:
              - "/etc/prometheus/scrape_d/*yaml"
          scrape_configs:
            - job_name: "prometheus"
              static_configs:
                - targets: ["172.16.16.249:9090"]
                  labels:
                    app: "prometheus"
            - job_name: "node_exporter"
              static_configs:
                - targets: ['172.16.16.249:9100']
                  labels:
                    app: "node_exporter"
