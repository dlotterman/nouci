#
runcmd:
    - [systemctl, daemon-reload]
    - [systemctl, enable, --now, nouci_disk_enc_first_boot.service]

write_files:
    - path: /etc/systemd/system/nouci_disk_enc_first_boot.service
      owner: root:root
      append: false
      content: |
          [Unit]
          Description=nouci_disk_enc_first_boot
          Requires=nouci_disk_local_first_boot.service cloud-init.service cloud-config.service cloud-init.target
          ConditionPathExists=!/opt/nouci/var/lock/nouci_data_enc.lock
          [Service]
          Type=oneshot
          RemainAfterExit=yes
          ExecStartPre=mkdir -p /opt/nouci/var/lock
          ExecStartPre=mkdir -p /opt/nouci/.s
          ExecStartPre=mkdir -p /mnt/nouci
          ExecStart=/bin/bash -c 'cp /etc/hostname /opt/nouci/.s/nouci_data_enc.key'
          ExecStart=cryptsetup luksFormat -q /opt/nouci/images/nouci_data.img --key-file /opt/nouci/.s/nouci_data_enc.key
          ExecStart=cryptsetup open /opt/nouci/images/nouci_data.img nouci_data_enc --key-file /opt/nouci/.s/nouci_data_enc.key
          ExecStart=mkfs.ext4 -L NOUCI_DATA /dev/mapper/nouci_data_enc
          ExecStart=/bin/bash -c 'echo "nouci_data_enc /opt/nouci/images/nouci_data.img /opt/nouci/.s/nouci_data_enc.key timeout=8" | tee -a /etc/crypttab'
          ExecStart=/bin/bash -c 'echo "LABEL=NOUCI_DATA /mnt/nouci ext4 defaults 0 2" | tee -a /etc/fstab'
          ExecStart=systemctl daemon-reload
          ExecStart=mount -t ext4 -L NOUCI_DATA /mnt/nouci
          ExecStartPost=touch /opt/nouci/var/lock/nouci_data_enc.lock
          ExecStartPost=touch /mnt/nouci/.ready
          ExecStartPost=systemctl disable nouci_disk_enc_first_boot.service
          [Install]
          WantedBy=multi-user.target

#
